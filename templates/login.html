<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPS Cyber Core - Gateway Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { 
            background: rgba(15, 23, 42, 0.45); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(6, 182, 212, 0.2); 
        }
        .neon-glow-cyan { box-shadow: 0 0 30px rgba(6, 182, 212, 0.15); }
        .input-cyber {
            background: rgba(3, 7, 18, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            transition: all 0.3s ease;
        }
        .input-cyber:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.25);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">

    <div class="w-full max-w-md glass-panel p-8 rounded-3xl neon-glow-cyan relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-cyan-500 via-purple-500 to-indigo-500"></div>

        <div class="text-center mb-8">
            <div class="inline-block p-3.5 bg-cyan-500/10 rounded-2xl border border-cyan-500/20 text-2xl mb-3 animate-pulse">
                🛡️
            </div>
            <h1 class="text-2xl font-extrabold bg-gradient-to-r from-cyan-400 via-teal-400 to-indigo-400 bg-clip-text text-transparent tracking-tight">
                IPS GATEWAY PORTAL
            </h1>
            <p class="text-slate-400 text-xs mt-1 uppercase tracking-widest font-semibold mono text-cyan-500/80">Enterprise Core v4.0</p>
        </div>

        {% if error %}
        <div class="mb-5 p-3.5 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs font-medium flex items-center gap-2">
            <span>⚠️</span> {{ error }}
        </div>
        {% endif %}
        {% if success %}
        <div class="mb-5 p-3.5 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-medium flex items-center gap-2">
            <span>✅</span> {{ success }}
        </div>
        {% endif %}

        <div id="login-form-container">
            <form action="/login" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Security ID / Username</label>
                    <input type="text" name="username" required autocomplete="off" placeholder="Enter admin/viewer user" 
                           class="w-full input-cyber p-3.5 rounded-xl text-slate-200 text-sm placeholder-slate-600">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Cryptographic Token / Password</label>
                    <input type="password" name="password" required placeholder="••••••••" 
                           class="w-full input-cyber p-3.5 rounded-xl text-slate-200 text-sm placeholder-slate-600">
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-cyan-600 via-blue-600 to-indigo-600 hover:from-cyan-500 hover:to-indigo-500 text-white font-bold text-xs uppercase tracking-wider py-4 rounded-xl transition-all shadow-lg shadow-cyan-500/10 active:scale-[0.98] mt-2">
                    Initialize Core Connection 🚀
                </button>
            </form>
            
            <div class="text-center mt-6 pt-5 border-t border-slate-800/60">
                <p class="text-xs text-slate-400">
                    New operator? 
                    <button onclick="toggleAuthMode()" class="text-cyan-400 font-bold hover:underline ml-1">Request Node Access</button>
                </p>
            </div>
        </div>

        <div id="register-form-container" class="hidden">
            <form action="/register" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Choose Operator Username</label>
                    <input type="text" name="username" required autocomplete="off" placeholder="e.g. cyber_analyst" 
                           class="w-full input-cyber p-3.5 rounded-xl text-slate-200 text-sm placeholder-slate-600">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Secure Core Password</label>
                    <input type="password" name="password" required placeholder="••••••••" 
                           class="w-full input-cyber p-3.5 rounded-xl text-slate-200 text-sm placeholder-slate-600">
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold text-xs uppercase tracking-wider py-4 rounded-xl transition-all shadow-lg shadow-indigo-500/10 active:scale-[0.98] mt-2">
                    Register Security Profile 📑
                </button>
            </form>
            
            <div class="text-center mt-6 pt-5 border-t border-slate-800/60">
                <p class="text-xs text-slate-400">
                    Existing cleared personal? 
                    <button onclick="toggleAuthMode()" class="text-purple-400 font-bold hover:underline ml-1">Return to Login</button>
                </p>
            </div>
        </div>

        <div class="mt-6 flex justify-center items-center gap-2 text-[10px] font-mono text-slate-500 tracking-wider uppercase">
            <span class="w-1.5 h-1.5 rounded-full bg-cyan-500 animate-ping"></span>
            AES-256 Cloud Shield Interlinked
        </div>
    </div>

    <script>
        // Smoothly Toggle between Login and Registration Modes
        function toggleAuthMode() {
            const loginForm = document.getElementById('login-form-container');
            const registerForm = document.getElementById('register-form-container');
            
            loginForm.classList.toggle('hidden');
            registerForm.classList.toggle('hidden');
        }
    </script>
</body>
</html>
